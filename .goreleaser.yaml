version: 2

project_name: codex-acp-adapter

before:
  hooks:
    - go mod tidy -diff
    - go test ./...

builds:
  - id: codex-acp-adapter
    main: ./cmd/codex-acp-adapter
    binary: codex-acp-adapter
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w -X github.com/hecatehq/codex-acp-adapter/internal/app.Version={{ .Version }}

archives:
  - id: binaries
    ids:
      - codex-acp-adapter
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "checksums.txt"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - '^(docs|test|chore)(\([^)]*\))?:'

release:
  prerelease: auto
